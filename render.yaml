services:
  - type: web
    name: voxly-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
      - key: VOXLY_SKIP_AUTOCREATE
        value: "false"
      - key: TURSO_URL
        sync: false # you will paste the real value in the Render dashboard
      - key: TURSO_TOKEN
        sync: false
      - key: VOXLY_JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
